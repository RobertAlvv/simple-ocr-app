name: simple_ocr
description: "OCR Processing — Invoice & Expense Management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Theming
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Navigation
  auto_route: ^10.2.2

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Functional Programming
  dartz: ^0.10.1

  # Firebase
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.7
  firebase_auth: ^5.5.5
  firebase_storage: ^12.4.5

  # Environment Variables
  flutter_dotenv: ^5.2.1

  # Image Caching
  cached_network_image: ^3.4.1

  # Annotations (needed at runtime)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.20.2
  uuid: ^4.5.3
  camera: ^0.12.0
  image_picker: ^1.2.1
  syncfusion_flutter_charts: ^32.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  auto_route_generator: ^10.2.2
  injectable_generator: ^2.5.0
  freezed: ^2.5.8
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true

  assets:
    - .env
